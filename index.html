<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Exam P Qbank — ADAPT + Spaced Repetition</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css"/>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; color: #1d1d1f; }
    button { font-family: inherit; }
    input, select { font-family: inherit; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

/* ============================ math rendering (KaTeX) ============================ */
function katexHTML(tex, display) {
  try { return window.katex.renderToString(tex, { displayMode: display, throwOnError: false }); }
  catch (e) { return tex; }
}
// Decide whether the text between two $ is real math (vs. a "$50 and $100" currency span).
// Keys on definitive math signals so digit-leading math ($1 + a$, $0 \le n(E)$) still renders.
function looksMath(s) {
  if (/[\\^_{}]/.test(s)) return true;                    // LaTeX command, sub/superscript, or group
  if (/[=<>]/.test(s) && /[A-Za-z]/.test(s)) return true; // relation involving a variable, e.g. P(X=4)
  if (s.length <= 12 && !/[A-Za-z]{3,}/.test(s)) return true; // short symbolic token, no words
  return false;                                            // prose between currency $ → leave literal
}
// Render a string that may contain $...$ (inline) or $$...$$ (display) LaTeX spans.
function Tex({ children }) {
  const text = children == null ? "" : String(children);
  if (!window.katex || text.indexOf("$") === -1) {
    return <span style={{ whiteSpace: "pre-wrap" }}>{text}</span>;
  }
  const parts = text.split(/(\$\$[\s\S]*?\$\$|\$[^$\n]+?\$)/g);
  return (
    <span style={{ whiteSpace: "pre-wrap" }}>
      {parts.map((p, i) => {
        if (p.length > 3 && p.startsWith("$$") && p.endsWith("$$"))
          return <span key={i} dangerouslySetInnerHTML={{ __html: katexHTML(p.slice(2, -2), true) }} />;
        if (p.length > 1 && p.startsWith("$") && p.endsWith("$") && looksMath(p.slice(1, -1)))
          return <span key={i} dangerouslySetInnerHTML={{ __html: katexHTML(p.slice(1, -1), false) }} />;
        return <span key={i}>{p}</span>;   // plain text (incl. currency like $50)
      })}
    </span>
  );
}

/* ============================ constants & engines ============================ */
const STORAGE_KEY = "examP_progress_v1";
const START_EL = 3.0;       // every learner starts mid-low until they prove out
const K = 0.5;              // ADAPT learning rate (max EL move per question)
const SPREAD = 2.0;         // ELO spread in "levels"
const DAY = 86400000;
const BRAND = "#534AB7", BRAND_L = "#EEEDFE";

// ----- ADAPT: ELO-style Earned Level (0-10) -----
function expectedScore(el, diff) { return 1 / (1 + Math.pow(10, (diff - el) / SPREAD)); }
function updateEL(el, diff, correct) {
  const e = expectedScore(el, diff);
  const next = el + K * ((correct ? 1 : 0) - e);
  return Math.max(0, Math.min(10, next));
}

// ----- Spaced repetition: SM-2 lite -----
function defaultCard() { return { ease: 2.5, intervalDays: 0, dueTs: 0, reps: 0, lapses: 0, lastTs: 0 }; }
function updateCard(prev, correct, now) {
  const c = { ...(prev || defaultCard()) };
  c.lastTs = now;
  if (correct) {
    c.reps += 1;
    if (c.reps === 1) c.intervalDays = 1;
    else if (c.reps === 2) c.intervalDays = 3;
    else c.intervalDays = Math.max(1, Math.round(c.intervalDays * c.ease));
    c.ease = Math.min(2.8, c.ease + 0.05);
    c.dueTs = now + c.intervalDays * DAY;
  } else {
    c.reps = 0;
    c.lapses += 1;
    c.ease = Math.max(1.3, c.ease - 0.2);
    c.intervalDays = 0;
    c.dueTs = now + 10 * 60 * 1000; // resurface in ~10 minutes
  }
  return c;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
const tkey = q => `${q.subject}::${q.topic}`;
const fmtEL = x => (Math.round(x * 10) / 10).toFixed(1);

// ----- question content loader (cached) -----
const qCache = {};
async function loadQuestion(path) {
  if (qCache[path]) return qCache[path];
  const r = await fetch("questions/" + path);
  if (!r.ok) throw new Error(`Failed to load questions/${path}: ${r.status}`);
  const j = await r.json();
  qCache[path] = j;
  return j;
}
async function fetchJSON(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`Failed to fetch ${path}: ${r.status}`);
  return r.json();
}

// ----- selection helpers -----
function dueList(questions, srs, now, subjectScope) {
  return questions
    .filter(q => !subjectScope || q.subject === subjectScope)
    .filter(q => srs[q.id] && srs[q.id].dueTs && srs[q.id].dueTs <= now)
    .sort((a, b) => srs[a.id].dueTs - srs[b.id].dueTs);
}
function pickAdaptive(questions, srs, el, now, subjectScope, lastId) {
  const due = dueList(questions, srs, now, subjectScope);
  if (due.length) return due[0];                       // SRS-due always wins
  let pool = questions.filter(q => !subjectScope || q.subject === subjectScope);
  if (pool.length > 1 && lastId) pool = pool.filter(q => q.id !== lastId);
  const unseen = pool.filter(q => !srs[q.id]);
  const cand = unseen.length ? unseen : pool;          // freshness before review
  const sorted = [...cand].sort((a, b) => Math.abs(a.difficulty - el) - Math.abs(b.difficulty - el));
  const top = sorted.slice(0, Math.min(4, sorted.length)); // small band near EL, pick randomly
  return top.length ? top[Math.floor(Math.random() * top.length)] : null;
}

/* ============================ data bootstrap ============================ */
function useAppData() {
  const [state, setState] = useState({ status: "loading", data: null, error: null });
  useEffect(() => {
    Promise.all([
      fetchJSON("data/curriculum.json"),
      fetchJSON("data/learn.json"),
      fetchJSON("questions/index.json"),
      fetchJSON("data/exams.json"),
    ])
      .then(([curriculum, learn, qIndex, examsData]) => {
        const questions = Array.isArray(qIndex.questions) ? qIndex.questions : [];
        const exams = (examsData && examsData.exams) || [];
        setState({ status: "ready", data: { curriculum, learn, questions, exams }, error: null });
      })
      .catch(err => setState({ status: "error", data: null, error: err.message }));
  }, []);
  return state;
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { const p = JSON.parse(raw); if (p && typeof p.el === "number") return p; }
  } catch (e) { /* ignore */ }
  return { version: 1, el: START_EL, elByTopic: {}, srs: {}, totalAnswered: 0, totalCorrect: 0, streak: 0, bestStreak: 0, history: [] };
}

/* ============================ shared question card ============================ */
function QuestionCard({ meta, accent, light, onAnswered, onNext, nextLabel, headerRight, banner }) {
  const [full, setFull] = useState(null);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState(null);
  const [selected, setSelected] = useState(null);
  const [submitted, setSubmitted] = useState(false);
  const [revealed, setRevealed] = useState(false);   // free-response: solution shown

  const load = useCallback(() => {
    let alive = true;
    setLoading(true); setErr(null); setFull(null); setSelected(null); setSubmitted(false); setRevealed(false);
    loadQuestion(meta.path)
      .then(j => { if (alive) { setFull(j); setLoading(false); } })
      .catch(e => { if (alive) { setErr(e.message); setLoading(false); } });
    return () => { alive = false; };
  }, [meta.path]);
  useEffect(load, [load]);

  function submit() {
    if (!selected || submitted || !full) return;
    setSubmitted(true);
    onAnswered(selected === full.answer, full);
  }
  function grade(ok) {
    if (submitted || !full) return;
    setSubmitted(true);
    onAnswered(ok, full);
  }

  if (loading) return <div style={{ color: "#888", padding: "40px 0", fontSize: 14 }}>Loading question…</div>;
  if (err) return (
    <div style={{ color: "#993C1D", padding: "20px 0", fontSize: 14 }}>
      {err} <button onClick={load} style={btn("#ddd", "transparent", "#444")}>Retry</button>
    </div>
  );
  if (!full) return null;
  const isFree = full.type === "free" || !full.options;
  const correct = selected === full.answer;
  const typeLabel = isFree ? "Free response · self-graded" : "Multiple choice";

  return (
    <div>
      {banner}
      <div style={{ display: "flex", gap: 8, marginBottom: 12, alignItems: "center", flexWrap: "wrap" }}>
        {full.subtopic && <span style={pill(light, accent)}>{full.subtopic}</span>}
        <span style={pill("#f0f0f0", "#555")}>Difficulty {full.difficulty}/10</span>
        <span style={pill("#f0f0f0", "#888")}>{typeLabel}</span>
        <span style={{ fontSize: 11, color: "#bbb", marginLeft: "auto" }}>{headerRight}</span>
      </div>
      <div style={{ padding: "18px 20px", marginBottom: 16, background: "#fff", border: "1px solid #e5e5ea", borderRadius: 10 }}>
        <div style={{ fontSize: 15.5, lineHeight: 1.85 }}><Tex>{full.question}</Tex></div>
      </div>

      {!isFree && (
        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 18 }}>
          {Object.entries(full.options).map(([letter, text]) => {
            let bg = "#fff", border = "1px solid #ddd", color = "#1d1d1f";
            if (submitted) {
              if (letter === full.answer) { bg = "#E1F5EE"; border = "1.5px solid #0F6E56"; color = "#0F6E56"; }
              else if (letter === selected) { bg = "#FAECE7"; border = "1.5px solid #993C1D"; color = "#993C1D"; }
            } else if (selected === letter) { bg = light; border = `1.5px solid ${accent}`; color = accent; }
            return (
              <div key={letter} onClick={() => !submitted && setSelected(letter)}
                style={{ padding: "12px 14px", borderRadius: 8, background: bg, border, color, cursor: submitted ? "default" : "pointer", fontSize: 14, lineHeight: 1.6, display: "flex", gap: 10, alignItems: "flex-start" }}>
                <span style={{ fontWeight: 600, minWidth: 18 }}>{letter}.</span><span><Tex>{text}</Tex></span>
              </div>
            );
          })}
        </div>
      )}

      {/* MULTIPLE CHOICE controls */}
      {!isFree && (!submitted ? (
        <button onClick={submit} disabled={!selected} style={btn(selected ? accent : "#e0e0e0", selected ? accent : "#e0e0e0", selected ? "#fff" : "#999", true)}>Submit</button>
      ) : (
        <div>
          <div style={{ padding: "14px 16px", marginBottom: 14, background: correct ? "#E1F5EE" : "#FAECE7", borderRadius: 8, fontSize: 14, lineHeight: 1.85 }}>
            <div style={{ fontWeight: 600, marginBottom: 6, color: correct ? "#0F6E56" : "#993C1D" }}>
              {correct ? "✓ Correct" : `✗ Incorrect — the answer is ${full.answer}`}
            </div>
            <div><Tex>{full.explanation}</Tex></div>
          </div>
          <button onClick={onNext} style={btn(accent, accent, "#fff", true)}>{nextLabel || "Next →"}</button>
        </div>
      ))}

      {/* FREE RESPONSE controls: reveal solution, then self-grade */}
      {isFree && (
        <div>
          {!revealed ? (
            <div>
              <div style={{ fontSize: 12.5, color: "#999", marginBottom: 10 }}>Work it out, then reveal the {full.answer ? "answer" : "solution"} and grade yourself.</div>
              <button onClick={() => setRevealed(true)} style={btn(accent, light, accent, true)}>Reveal {full.answer ? "answer" : "solution"} →</button>
            </div>
          ) : (
            <div>
              {full.answer && (
                <div style={{ padding: "10px 16px", marginBottom: 10, background: "#E6F1FB", borderRadius: 8, fontSize: 14.5, fontWeight: 600, color: "#185FA5" }}>
                  Answer: <Tex>{full.answer}</Tex>
                </div>
              )}
              <div style={{ padding: "14px 16px", marginBottom: 14, background: "#fff", border: `1px solid ${accent}`, borderRadius: 8, fontSize: 14, lineHeight: 1.85 }}>
                <Tex>{full.explanation}</Tex>
              </div>
              {!submitted ? (
                <div>
                  <div style={{ fontSize: 12.5, color: "#888", marginBottom: 8 }}>Did you get it right?</div>
                  <div style={{ display: "flex", gap: 10 }}>
                    <button onClick={() => grade(true)} style={btn("#0F6E56", "#E1F5EE", "#0F6E56", true)}>✓ Got it</button>
                    <button onClick={() => grade(false)} style={btn("#993C1D", "#FAECE7", "#993C1D", true)}>✗ Missed it</button>
                  </div>
                </div>
              ) : (
                <button onClick={onNext} style={btn(accent, accent, "#fff", true)}>{nextLabel || "Next →"}</button>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ============================ ADAPT practice ============================ */
function AdaptView({ questions, progress, commit, subjects }) {
  const [scope, setScope] = useState("");        // "" = all subjects
  const [meta, setMeta] = useState(null);
  const [fb, setFb] = useState(null);            // {correct, before, after}
  const lastId = useRef(null);

  const advance = useCallback((scopeVal) => {
    setFb(null);
    const next = pickAdaptive(questions, progress.srs, progress.el, Date.now(), scopeVal || null, lastId.current);
    if (next) lastId.current = next.id;
    setMeta(next);
  }, [questions, progress.srs, progress.el]);

  useEffect(() => { if (!meta) advance(scope); }, []); // first load

  function onAnswered(correct, full) {
    const before = progress.el;
    const after = updateEL(before, full.difficulty, correct);
    setFb({ correct, before, after });
    commit(full, correct);
  }

  const due = dueList(questions, progress.srs, Date.now(), scope || null).length;

  return (
    <div style={{ maxWidth: 760 }}>
      <PanelHead title="ADAPT Practice" sub="Adaptive difficulty — each answer re-estimates your Earned Level. Due review cards are served first." />
      <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
        <span style={{ fontSize: 12, color: "#888" }}>Focus:</span>
        <select value={scope} onChange={e => { setScope(e.target.value); advance(e.target.value); }}
          style={{ padding: "5px 8px", fontSize: 13, borderRadius: 6, border: "1px solid #ddd", background: "#fff" }}>
          <option value="">All subjects</option>
          {subjects.map(s => <option key={s.label} value={s.label}>{s.label}</option>)}
        </select>
        {due > 0 && <span style={pill("#FFF4E0", "#9A6700")}>🔁 {due} due for review</span>}
      </div>

      {fb && (
        <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", marginBottom: 14, borderRadius: 8, background: fb.after >= fb.before ? "#E1F5EE" : "#FAECE7" }}>
          <span style={{ fontSize: 13, color: "#444" }}>Earned Level</span>
          <span style={{ fontWeight: 700, fontSize: 15 }}>{fmtEL(fb.before)} → {fmtEL(fb.after)}</span>
          <span style={{ fontSize: 13, fontWeight: 600, color: fb.after >= fb.before ? "#0F6E56" : "#993C1D" }}>
            {fb.after >= fb.before ? "▲" : "▼"} {(fb.after >= fb.before ? "+" : "") + fmtEL(fb.after - fb.before)}
          </span>
        </div>
      )}

      {meta ? (
        <QuestionCard key={meta.id} meta={meta} accent={BRAND} light={BRAND_L}
          headerRight={meta.subject}
          onAnswered={onAnswered} onNext={() => advance(scope)} nextLabel="Next adaptive question →" />
      ) : (
        <div style={{ color: "#888", padding: "40px 0" }}>No questions available for this focus.</div>
      )}
    </div>
  );
}

/* ============================ SRS review ============================ */
function ReviewView({ questions, progress, commit }) {
  const [meta, setMeta] = useState(null);
  const [active, setActive] = useState(false);
  const [done, setDone] = useState(0);

  const nextDue = useCallback(() => {
    const due = dueList(questions, progress.srs, Date.now(), null);
    if (due.length) { setMeta(due[0]); return true; }
    setMeta(null); return false;
  }, [questions, progress.srs]);

  const due = dueList(questions, progress.srs, Date.now(), null);
  const upcoming = questions
    .filter(q => progress.srs[q.id] && progress.srs[q.id].dueTs > Date.now())
    .sort((a, b) => progress.srs[a.id].dueTs - progress.srs[b.id].dueTs);
  const nextTime = upcoming.length ? upcoming[0].dueTs : null;

  function start() { setActive(true); setDone(0); nextDue(); }
  function onAnswered(correct, full) { commit(full, correct); setDone(d => d + 1); }
  function onNext() { if (!nextDue()) setActive(false); }

  if (active && meta) {
    return (
      <div style={{ maxWidth: 760 }}>
        <PanelHead title="Spaced Repetition Review" sub={`${due.length} card${due.length === 1 ? "" : "s"} due · ${done} reviewed this session`} />
        <QuestionCard key={meta.id} meta={meta} accent="#0F6E56" light="#E1F5EE"
          headerRight={`${meta.subject} · ${meta.topic}`}
          onAnswered={onAnswered} onNext={onNext} nextLabel="Next due card →" />
      </div>
    );
  }

  return (
    <div style={{ maxWidth: 620 }}>
      <PanelHead title="Spaced Repetition Review" sub="Questions you've answered are scheduled to resurface on a forgetting curve (SM-2). Missed ones come back fast; mastered ones space out." />
      <div style={{ background: "#fff", border: "1px solid #e5e5ea", borderRadius: 12, padding: "28px 26px", textAlign: "center" }}>
        <div style={{ fontSize: 44, fontWeight: 700, color: due.length ? "#0F6E56" : "#bbb" }}>{due.length}</div>
        <div style={{ fontSize: 13, color: "#888", marginBottom: 18 }}>card{due.length === 1 ? "" : "s"} due now</div>
        {due.length > 0 ? (
          <button onClick={start} style={btn("#0F6E56", "#0F6E56", "#fff", true)}>Start review →</button>
        ) : (
          <div style={{ fontSize: 14, color: "#666", lineHeight: 1.7 }}>
            {done > 0 && <div style={{ color: "#0F6E56", fontWeight: 600, marginBottom: 8 }}>✓ All caught up — {done} reviewed.</div>}
            {nextTime ? <div>Next card is due {relTime(nextTime)}.</div> : <div>Answer questions in ADAPT Practice or a quiz to build your review queue.</div>}
          </div>
        )}
      </div>
    </div>
  );
}

/* ============================ custom quiz ============================ */
function QuizView({ questions, progress, commit, subjects }) {
  const [picked, setPicked] = useState({});      // {topicKey: true}
  const [count, setCount] = useState(10);
  const [minD, setMinD] = useState(1);
  const [maxD, setMaxD] = useState(10);
  const [quiz, setQuiz] = useState(null);        // {items:[], idx, results:[]}

  const allKeys = useMemo(() => {
    const m = {};
    subjects.forEach(s => s.topics.forEach(t => { m[`${s.label}::${t}`] = true; }));
    return m;
  }, [subjects]);

  function toggleTopic(k) { setPicked(p => ({ ...p, [k]: !p[k] })); }
  function toggleSubject(s, on) { setPicked(p => { const n = { ...p }; s.topics.forEach(t => { n[`${s.label}::${t}`] = on; }); return n; }); }

  const selectedKeys = Object.keys(picked).filter(k => picked[k] && allKeys[k]);
  const eligible = questions.filter(q =>
    (selectedKeys.length === 0 || picked[tkey(q)]) && q.difficulty >= minD && q.difficulty <= maxD);

  function generate() {
    const pool = shuffle(eligible);
    const items = pool.slice(0, Math.min(count, pool.length));
    if (items.length) setQuiz({ items, idx: 0, results: [] });
  }

  if (quiz) {
    const m = quiz.items[quiz.idx];
    if (quiz.idx >= quiz.items.length) return <QuizReport quiz={quiz} onDone={() => setQuiz(null)} />;
    return (
      <div style={{ maxWidth: 760 }}>
        <PanelHead title="Custom Quiz" sub={`Question ${quiz.idx + 1} of ${quiz.items.length}`} />
        <div style={{ height: 5, background: "#f0f0f0", borderRadius: 3, marginBottom: 18 }}>
          <div style={{ height: 5, width: `${(quiz.idx / quiz.items.length) * 100}%`, background: BRAND, borderRadius: 3, transition: "width .3s" }} />
        </div>
        <QuestionCard key={m.id} meta={m} accent={BRAND} light={BRAND_L} headerRight={`${m.subject} · ${m.topic}`}
          onAnswered={(correct, full) => { commit(full, correct); setQuiz(q => ({ ...q, results: [...q.results, { meta: m, correct }] })); }}
          onNext={() => setQuiz(q => ({ ...q, idx: q.idx + 1 }))}
          nextLabel={quiz.idx + 1 >= quiz.items.length ? "See results →" : "Next →"} />
      </div>
    );
  }

  return (
    <div style={{ maxWidth: 680 }}>
      <PanelHead title="Build a Custom Quiz" sub="Pick topics, length, and a difficulty band. Quiz answers still count toward your Earned Level and review schedule." />
      <div style={{ background: "#fff", border: "1px solid #e5e5ea", borderRadius: 12, padding: "18px 20px", marginBottom: 16 }}>
        <div style={{ fontSize: 12, fontWeight: 600, color: "#888", marginBottom: 10 }}>TOPICS <span style={{ fontWeight: 400 }}>(none selected = all)</span></div>
        {subjects.map(s => {
          const allOn = s.topics.every(t => picked[`${s.label}::${t}`]);
          return (
            <div key={s.label} style={{ marginBottom: 12 }}>
              <div onClick={() => toggleSubject(s, !allOn)} style={{ cursor: "pointer", fontSize: 13, fontWeight: 600, color: s.color, marginBottom: 4, display: "flex", alignItems: "center", gap: 6 }}>
                <span>{allOn ? "☑" : "☐"}</span><span>{s.icon} {s.label}</span>
              </div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6, paddingLeft: 18 }}>
                {s.topics.map(t => {
                  const k = `${s.label}::${t}`; const on = !!picked[k];
                  return <span key={t} onClick={() => toggleTopic(k)} style={{ cursor: "pointer", fontSize: 12, padding: "4px 10px", borderRadius: 14, border: `1px solid ${on ? s.color : "#ddd"}`, background: on ? s.light : "#fff", color: on ? s.color : "#666" }}>{t}</span>;
                })}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginBottom: 18 }}>
        <label style={{ fontSize: 13, color: "#444" }}>Questions:&nbsp;
          <select value={count} onChange={e => setCount(+e.target.value)} style={sel()}>
            {[5, 10, 15, 20, 30].map(n => <option key={n} value={n}>{n}</option>)}
          </select>
        </label>
        <label style={{ fontSize: 13, color: "#444" }}>Difficulty:&nbsp;
          <select value={minD} onChange={e => setMinD(+e.target.value)} style={sel()}>
            {[1, 2, 3, 4, 5, 6, 7, 8].map(n => <option key={n} value={n}>{n}</option>)}
          </select> &nbsp;to&nbsp;
          <select value={maxD} onChange={e => setMaxD(+e.target.value)} style={sel()}>
            {[2, 3, 4, 5, 6, 7, 8, 9, 10].map(n => <option key={n} value={n}>{n}</option>)}
          </select>
        </label>
      </div>

      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
        <button onClick={generate} disabled={eligible.length === 0} style={btn(eligible.length ? BRAND : "#e0e0e0", eligible.length ? BRAND : "#e0e0e0", eligible.length ? "#fff" : "#999", true)}>
          Generate quiz →
        </button>
        <span style={{ fontSize: 12, color: "#888" }}>{eligible.length} matching question{eligible.length === 1 ? "" : "s"} in bank</span>
      </div>
    </div>
  );
}

function QuizReport({ quiz, onDone }) {
  const total = quiz.results.length;
  const correct = quiz.results.filter(r => r.correct).length;
  const pct = total ? Math.round((100 * correct) / total) : 0;
  const byTopic = {};
  quiz.results.forEach(r => { const k = r.meta.topic; (byTopic[k] = byTopic[k] || { c: 0, t: 0 }); byTopic[k].t++; if (r.correct) byTopic[k].c++; });
  return (
    <div style={{ maxWidth: 620 }}>
      <PanelHead title="Quiz Results" sub="" />
      <div style={{ background: "#fff", border: "1px solid #e5e5ea", borderRadius: 12, padding: "26px 24px", textAlign: "center", marginBottom: 16 }}>
        <div style={{ fontSize: 46, fontWeight: 700, color: pct >= 70 ? "#0F6E56" : pct >= 50 ? "#9A6700" : "#993C1D" }}>{pct}%</div>
        <div style={{ fontSize: 14, color: "#888" }}>{correct} of {total} correct</div>
      </div>
      <div style={{ background: "#fff", border: "1px solid #e5e5ea", borderRadius: 12, padding: "16px 20px", marginBottom: 18 }}>
        <div style={{ fontSize: 12, fontWeight: 600, color: "#888", marginBottom: 10 }}>BY TOPIC</div>
        {Object.entries(byTopic).map(([t, s]) => (
          <div key={t} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, padding: "5px 0", borderBottom: "1px solid #f3f3f3" }}>
            <span>{t}</span><span style={{ color: s.c === s.t ? "#0F6E56" : s.c === 0 ? "#993C1D" : "#444", fontWeight: 600 }}>{s.c}/{s.t}</span>
          </div>
        ))}
      </div>
      <button onClick={onDone} style={btn(BRAND, BRAND, "#fff", true)}>Build another quiz →</button>
    </div>
  );
}

function TestsView({ exams, progress, onExamDone }) {
  const [active, setActive] = useState(null);

  const scores = progress.examScores || {};
  return (
    <div style={{ maxWidth: 680 }}>
      <PanelHead title="Practice Tests" sub="Full-length sample exams from Finan, taken end-to-end like the real thing — answers are revealed only in the score report. These are separate from your ADAPT Earned Level and review queue." />

        const sc = scores[ex.id];
        return (
          <div key={ex.id} style={{ display: "flex", alignItems: "center", gap: 14, padding: "16px 20px", marginBottom: 12, background: "#fff", border: "1px solid #e5e5ea", borderRadius: 12 }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 15, fontWeight: 600 }}>{ex.name}</div>
              <div style={{ fontSize: 12, color: "#888", marginTop: 2 }}>{ex.count} questions · {ex.minutes} min{sc ? ` · best ${sc.bestPct}% · last ${sc.lastPct}% (${sc.attempts}×)` : ""}</div>

function TestRunner({ exam, onDone, onExit }) {
  const qs = exam.questions;
  const [idx, setIdx] = useState(0);
  const [answers, setAnswers] = useState({});
  const [finished, setFinished] = useState(false);
  const [remaining, setRemaining] = useState(exam.minutes * 60);

  const finish = useCallback(() => {
    setFinished(prev => {
      if (prev) return prev;
      const correct = qs.filter(qq => answers[qq.n] === qq.answer).length;
      onDone(exam.id, correct, qs.length);
      return true;
    });
  }, [answers, qs, exam.id, onDone]);

  useEffect(() => {
    if (finished) return;
    const t = setInterval(() => setRemaining(r => (r <= 1 ? 0 : r - 1)), 1000);
    return () => clearInterval(t);
  }, [finished]);
  useEffect(() => { if (remaining === 0 && !finished) finish(); }, [remaining, finished, finish]);

  if (finished) return <TestReport exam={exam} answers={answers} onExit={onExit} />;

  const q = qs[idx];
  const answeredCount = Object.keys(answers).length;
  const mm = String(Math.floor(remaining / 60)).padStart(2, "0");
  const ss = String(remaining % 60).padStart(2, "0");

  return (
    <div style={{ maxWidth: 780 }}>
      <div style={{ display: "flex", alignItems: "center", marginBottom: 12 }}>
        <div style={{ fontSize: 18, fontWeight: 700, flex: 1 }}>{exam.name}</div>
        <span style={pill(remaining < 300 ? "#FAECE7" : "#f0f0f0", remaining < 300 ? "#993C1D" : "#555")}>⏱ {mm}:{ss}</span>
      </div>
      <div style={{ height: 5, background: "#f0f0f0", borderRadius: 3, marginBottom: 12 }}>
        <div style={{ height: 5, width: `${(answeredCount / qs.length) * 100}%`, background: BRAND, borderRadius: 3, transition: "width .3s" }} />
      </div>
      <div style={{ fontSize: 12, color: "#888", marginBottom: 10 }}>Question {idx + 1} of {qs.length} · {answeredCount} answered</div>
      <div style={{ padding: "18px 20px", marginBottom: 16, background: "#fff", border: "1px solid #e5e5ea", borderRadius: 10, fontSize: 15.5, lineHeight: 1.85 }}><Tex>{q.question}</Tex></div>
      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 18 }}>
        {Object.entries(q.options).map(([letter, text]) => {
          const sel = answers[q.n] === letter;
          return (
            <div key={letter} onClick={() => setAnswers(a => ({ ...a, [q.n]: letter }))}
              style={{ padding: "12px 14px", borderRadius: 8, background: sel ? BRAND_L : "#fff", border: `1.5px solid ${sel ? BRAND : "#ddd"}`, color: sel ? BRAND : "#1d1d1f", cursor: "pointer", fontSize: 14, lineHeight: 1.6, display: "flex", gap: 10 }}>
              <span style={{ fontWeight: 600, minWidth: 18 }}>{letter}.</span><span><Tex>{text}</Tex></span>
            </div>
          );
        })}
      </div>
      <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
        <button onClick={() => setIdx(i => Math.max(0, i - 1))} disabled={idx === 0} style={btn("#ddd", "#fff", idx === 0 ? "#bbb" : "#444")}>← Prev</button>
        {idx < qs.length - 1
          ? <button onClick={() => setIdx(i => i + 1)} style={btn(BRAND, BRAND, "#fff", true)}>Next →</button>
          : <button onClick={finish} style={btn("#0F6E56", "#0F6E56", "#fff", true)}>Finish exam</button>}
        <button onClick={finish} style={{ ...btn("#ddd", "#fff", "#888"), marginLeft: "auto" }}>Finish early</button>
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginTop: 18 }}>
        {qs.map((qq, i) => (
          <div key={qq.n} onClick={() => setIdx(i)} title={`Question ${i + 1}`}
            style={{ width: 24, height: 24, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10.5, borderRadius: 5, cursor: "pointer", background: i === idx ? BRAND : (answers[qq.n] ? BRAND_L : "#f0f0f0"), color: i === idx ? "#fff" : (answers[qq.n] ? BRAND : "#999") }}>{i + 1}</div>
        ))}
      </div>
    </div>
  );
}

function TestReport({ exam, answers, onExit }) {
  const qs = exam.questions;
  const correct = qs.filter(q => answers[q.n] === q.answer).length;
  const pct = Math.round((100 * correct) / qs.length);
  const [review, setReview] = useState(false);
  return (
    <div style={{ maxWidth: 780 }}>
      <PanelHead title={`${exam.name} — Results`} sub="" />
      <div style={{ background: "#fff", border: "1px solid #e5e5ea", borderRadius: 12, padding: "26px 24px", textAlign: "center", marginBottom: 16 }}>
        <div style={{ fontSize: 46, fontWeight: 700, color: pct >= 70 ? "#0F6E56" : pct >= 55 ? "#9A6700" : "#993C1D" }}>{pct}%</div>
        <div style={{ fontSize: 14, color: "#888" }}>{correct} of {qs.length} correct</div>
        <div style={{ fontSize: 12, color: "#aaa", marginTop: 6 }}>Exam P typically requires roughly 70% to pass.</div>
      </div>
      <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
        <button onClick={() => setReview(r => !r)} style={btn(BRAND, review ? BRAND_L : "#fff", BRAND)}>{review ? "Hide review" : "Review answers"}</button>
        <button onClick={onExit} style={btn(BRAND, BRAND, "#fff", true)}>Back to tests</button>
      </div>
      {review && qs.map((q, i) => {
        const your = answers[q.n], ok = your === q.answer;
        return (
          <div key={q.n} style={{ padding: "14px 16px", marginBottom: 10, background: "#fff", border: `1px solid ${ok ? "#cde9df" : "#f1d9cf"}`, borderRadius: 10 }}>
            <div style={{ fontSize: 12, color: "#888", marginBottom: 4 }}>Q{i + 1} {ok ? "✓" : "✗"}</div>
            <div style={{ fontSize: 14, lineHeight: 1.7, marginBottom: 8 }}><Tex>{q.question}</Tex></div>
            <div style={{ fontSize: 13 }}>
              <span style={{ color: ok ? "#0F6E56" : "#993C1D" }}>Your answer: {your || "—"}{your ? <span> (<Tex>{q.options[your]}</Tex>)</span> : ""}</span>
              {!ok && <span style={{ color: "#0F6E56", marginLeft: 12 }}>Correct: {q.answer} (<Tex>{q.options[q.answer]}</Tex>)</span>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function PanelHead({ title, sub }) {

    <div style={{ marginBottom: 18 }}>
      <div style={{ fontSize: 20, fontWeight: 700 }}>{title}</div>
      {sub && <div style={{ fontSize: 13, color: "#888", marginTop: 4, lineHeight: 1.6, maxWidth: 640 }}>{sub}</div>}

function Sidebar({ curriculum, progress, mode, setMode, dueCount, onReset, onImport }) {
  const fileRef = useRef(null);
  function exportProgress() {
    const blob = new Blob([JSON.stringify(progress, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `examp-progress-${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  }
  function onFile(e) {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => { try { onImport(JSON.parse(r.result)); } catch (err) { window.alert("Could not read that backup file."); } };
    r.readAsText(f); e.target.value = "";
  }
  const subjects = curriculum.subjects;
  const pass = curriculum.passLevel || 7;
  const levels = curriculum.levels || [];
  const el = progress.el;
  const tier = [...levels].reverse().find(l => el >= l.el);
  const nextTier = levels.find(l => el < l.el);
  const acc = el >= pass ? "#0F6E56" : el >= pass - 1 ? "#9A6700" : BRAND;

  const subjEL = subjects.map(s => {
    const vals = s.topics.map(t => progress.elByTopic[`${s.label}::${t}`]).filter(v => typeof v === "number");
    const avg = vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
    return { s, avg };
  });

  const navItems = [
    { id: "adapt", icon: "🎯", label: "ADAPT Practice" },
    { id: "review", icon: "🔁", label: "Review", badge: dueCount },
    { id: "quiz", icon: "📝", label: "Custom Quiz" },
    { id: "tests", icon: "📄", label: "Practice Tests" },
    { id: "learn", icon: "📖", label: "Learn" },
  ];

  return (
    <div style={{ width: 256, minWidth: 256, background: "#fff", borderRight: "1px solid #e5e5ea", display: "flex", flexDirection: "column", height: "100vh" }}>
      <div style={{ padding: "16px 16px 14px", borderBottom: "1px solid #e5e5ea" }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: BRAND, letterSpacing: 0.3 }}>EXAM P · PROBABILITY</div>
        <div style={{ fontSize: 11, color: "#aaa", marginTop: 2 }}>Earned Level</div>
        <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
          <span style={{ fontSize: 36, fontWeight: 700, color: acc, lineHeight: 1.1 }}>{fmtEL(el)}</span>
          <span style={{ fontSize: 13, color: "#bbb" }}>/ 10</span>
        </div>
        <div style={{ position: "relative", height: 6, background: "#f0f0f0", borderRadius: 3, marginTop: 6 }}>
          <div style={{ height: 6, width: `${(el / 10) * 100}%`, background: acc, borderRadius: 3, transition: "width .4s" }} />
          <div title={`Pass level ${pass}`} style={{ position: "absolute", top: -2, left: `${(pass / 10) * 100}%`, width: 2, height: 10, background: "#0F6E56" }} />
        </div>
        <div style={{ fontSize: 11, color: "#888", marginTop: 6 }}>
          {tier ? <span>{tier.icon} {tier.label}</span> : "🌱 Getting Started"}
          {el >= pass && <span style={{ color: "#0F6E56", fontWeight: 600 }}> · exam ready</span>}
        </div>
        {nextTier && <div style={{ fontSize: 10.5, color: "#aaa", marginTop: 2 }}>{fmtEL(nextTier.el - el)} to {nextTier.icon} {nextTier.label}</div>}
      </div>

      <div style={{ padding: "8px 8px 4px" }}>
        {navItems.map(n => (
          <div key={n.id} onClick={() => setMode(n.id)}
            style={{ display: "flex", alignItems: "center", gap: 9, padding: "9px 12px", margin: "2px 0", borderRadius: 8, cursor: "pointer", fontSize: 13.5, fontWeight: mode === n.id ? 600 : 400, background: mode === n.id ? BRAND_L : "transparent", color: mode === n.id ? BRAND : "#1d1d1f" }}>
            <span>{n.icon}</span><span>{n.label}</span>
            {n.badge > 0 && <span style={{ marginLeft: "auto", fontSize: 11, fontWeight: 600, background: "#0F6E56", color: "#fff", borderRadius: 10, padding: "1px 7px" }}>{n.badge}</span>}
          </div>
        ))}
      </div>

      <div style={{ flex: 1, overflowY: "auto", padding: "10px 14px" }}>
        <div style={{ fontSize: 10.5, fontWeight: 600, color: "#aaa", letterSpacing: 0.4, marginBottom: 6 }}>EARNED LEVEL BY SUBJECT</div>
        {subjEL.map(({ s, avg }) => (
          <div key={s.label} style={{ marginBottom: 10 }}>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11.5, color: "#555", marginBottom: 3 }}>
              <span>{s.icon} {s.label}</span>
              <span style={{ color: avg == null ? "#ccc" : s.color, fontWeight: 600 }}>{avg == null ? "—" : fmtEL(avg)}</span>
            </div>
            <div style={{ height: 4, background: "#f0f0f0", borderRadius: 2 }}>
              <div style={{ height: 4, width: `${((avg || 0) / 10) * 100}%`, background: s.color, borderRadius: 2 }} />
            </div>
          </div>
        ))}
      </div>

      <div style={{ padding: "10px 14px", borderTop: "1px solid #e5e5ea", fontSize: 11, color: "#888" }}>
        <div>{progress.totalCorrect}/{progress.totalAnswered} correct · 🔥 {progress.streak} streak</div>
        <div style={{ display: "flex", gap: 12, marginTop: 6 }}>
          <span onClick={exportProgress} title="Download a backup of your progress" style={{ cursor: "pointer", color: "#888" }}>⬇ Export</span>
          <span onClick={() => fileRef.current && fileRef.current.click()} title="Restore progress from a backup file" style={{ cursor: "pointer", color: "#888" }}>⬆ Import</span>
          <span onClick={onReset} style={{ cursor: "pointer", color: "#bbb", marginLeft: "auto" }}>↺ Reset</span>
        </div>
        <input ref={fileRef} type="file" accept="application/json,.json" onChange={onFile} style={{ display: "none" }} />
      </div>
    </div>
  );
}

function App() {
  const { status, data, error } = useAppData();
  const [progress, setProgress] = useState(loadProgress);
  const [mode, setMode] = useState("adapt");
  const [, forceRender] = useState(0);

  // KaTeX loads via a deferred CDN script; if it isn't ready at first render, poll and
  // re-render once it arrives so math isn't left showing raw $...$ source.
  useEffect(() => {
    if (window.katex) return;
    const id = setInterval(() => { if (window.katex) { clearInterval(id); forceRender(n => n + 1); } }, 150);
    const stop = setTimeout(() => clearInterval(id), 10000);
    return () => { clearInterval(id); clearTimeout(stop); };
  }, []);

  useEffect(() => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); } catch (e) { /* ignore */ } }, [progress]);

  const commit = useCallback((q, correct) => {
    setProgress(p => {
      const now = Date.now();
      const tk = `${q.subject}::${q.topic}`;
      const streak = correct ? p.streak + 1 : 0;
      return {
        ...p,
        el: updateEL(p.el, q.difficulty, correct),
        elByTopic: { ...p.elByTopic, [tk]: updateEL(p.elByTopic[tk] ?? START_EL, q.difficulty, correct) },
        srs: { ...p.srs, [q.id]: updateCard(p.srs[q.id], correct, now) },
        totalAnswered: p.totalAnswered + 1,
        totalCorrect: p.totalCorrect + (correct ? 1 : 0),
        streak, bestStreak: Math.max(p.bestStreak, streak),
        history: [...p.history.slice(-499), { id: q.id, correct, ts: now, diff: q.difficulty, tk }],
      };
    });
  }, []);

  const recordExam = useCallback((examId, correct, total) => {
    const pct = total ? Math.round((100 * correct) / total) : 0;
    setProgress(p => {
      const prev = (p.examScores || {})[examId];
      return { ...p, examScores: { ...(p.examScores || {}),
        [examId]: { lastPct: pct, lastCorrect: correct, total, bestPct: Math.max(pct, prev ? prev.bestPct : 0), attempts: (prev ? prev.attempts : 0) + 1 } } };
    });
  }, []);

  function reset() {
    if (!window.confirm("Reset all Earned Level, review schedule, and history?")) return;
    const fresh = { version: 1, el: START_EL, elByTopic: {}, srs: {}, totalAnswered: 0, totalCorrect: 0, streak: 0, bestStreak: 0, history: [], examScores: {} };
    setProgress(fresh);
  }

  const importProgress = useCallback((obj) => {
    if (!obj || typeof obj.el !== "number") { window.alert("That file doesn't look like an Exam P progress backup."); return; }
    const base = { version: 1, el: START_EL, elByTopic: {}, srs: {}, totalAnswered: 0, totalCorrect: 0, streak: 0, bestStreak: 0, history: [], examScores: {} };
    setProgress({ ...base, ...obj });
    window.alert("Progress restored from backup.");
  }, []);

  if (status === "loading") return <Center>Loading Exam P qbank…</Center>;
  if (status === "error") return (
    <div style={{ padding: 40, maxWidth: 600, margin: "60px auto", background: "#fff", borderRadius: 12, border: "1px solid #e5e5ea" }}>
      <div style={{ fontSize: 20, fontWeight: 600, marginBottom: 12, color: "#993C1D" }}>Could not load data</div>
      <div style={{ fontSize: 14, lineHeight: 1.7, color: "#444", marginBottom: 16 }}>Run via a local server, not by opening the file directly.</div>
      <div style={{ fontSize: 13, background: "#f5f5f7", padding: 14, borderRadius: 8, fontFamily: "monospace", lineHeight: 1.8 }}>
        python3 -m http.server<br/># then open http://localhost:8000
      </div>
      <div style={{ fontSize: 12, color: "#999", marginTop: 12 }}>Error: {error}</div>
    </div>
  );

  const { curriculum, learn, questions, exams } = data;
  const subjects = curriculum.subjects;
  const dueCount = dueList(questions, progress.srs, Date.now(), null).length;

  return (
    <div style={{ display: "flex", height: "100vh", overflow: "hidden" }}>
      <Sidebar curriculum={curriculum} progress={progress} mode={mode} setMode={setMode} dueCount={dueCount} onReset={reset} onImport={importProgress} />
      <div style={{ flex: 1, overflowY: "auto", padding: "28px 36px" }}>
        {mode === "adapt" && <AdaptView questions={questions} progress={progress} commit={commit} subjects={subjects} />}
        {mode === "review" && <ReviewView questions={questions} progress={progress} commit={commit} />}
        {mode === "quiz" && <QuizView questions={questions} progress={progress} commit={commit} subjects={subjects} />}
        {mode === "tests" && <TestsView exams={exams} progress={progress} onExamDone={recordExam} />}
        {mode === "learn" && <LearnView subjects={subjects} learn={learn} onPractice={() => setMode("adapt")} />}
      </div>
    </div>
  );
}

/* ============================ small helpers ============================ */
function Center({ children }) { return <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", color: "#888", fontSize: 15 }}>{children}</div>; }
function pill(bg, color) { return { fontSize: 11, padding: "2px 8px", background: bg, color, borderRadius: 10 }; }
function sel() { return { padding: "4px 8px", fontSize: 13, borderRadius: 6, border: "1px solid #ddd", background: "#fff" }; }
function btn(borderC, bg, color, solid) {
  return { padding: "8px 18px", fontSize: 13, cursor: "pointer", background: bg, color, border: `1px solid ${borderC}`, borderRadius: 8, fontWeight: 500 };
}
function relTime(ts) {
  const ms = ts - Date.now();
  if (ms <= 0) return "now";
  const min = Math.round(ms / 60000);
  if (min < 60) return `in ${min} min`;
  const hr = Math.round(min / 60);
  if (hr < 24) return `in ${hr} hr`;
  const d = Math.round(hr / 24);
  return `in ${d} day${d === 1 ? "" : "s"}`;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
